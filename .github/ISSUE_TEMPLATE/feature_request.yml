name: Feature Request
description: Suggest a new feature for OdaxAI Studio
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the solution you'd like.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - macOS App
        - OdaxChat (Web UI)
        - AI Engine (llama.cpp)
        - New Component
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any alternative solutions or features you've considered.
