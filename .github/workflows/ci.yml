name: CI / CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Copyright & repo hygiene checks
  # ─────────────────────────────────────────────
  hygiene:
    name: Copyright headers & repo hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check copyright headers on source files
        run: |
          MISSING=0
          for f in $(find . -not -path './.git/*' -not -path '*/node_modules/*' \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.swift" -o -name "*.js" -o -name "*.mjs" \) \
            ! -name "*.d.ts" ! -name "*.min.js" ! -name "*.config.js" ! -name "*.config.ts" \
            ! -path "*/next-env.d.ts"); do
            if ! head -10 "$f" | grep -q "Copyright.*OdaxAI SRL"; then
              echo "❌ Missing copyright: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "::error::$MISSING file(s) missing the OdaxAI SRL copyright header."
            echo "Every source file must start with:"
            echo "  // OdaxAI Studio"
            echo "  // Copyright © 2026 OdaxAI SRL. All rights reserved."
            echo "  // Licensed under the PolyForm Noncommercial License 1.0.0"
            exit 1
          fi
          echo "✅ All source files have copyright headers"

      - name: Check no secrets or personal paths
        run: |
          FAIL=0
          if grep -rn '/Users/[a-zA-Z]' --include="*.ts" --include="*.tsx" --include="*.swift" --include="*.sh" --include="*.yml" . 2>/dev/null | grep -v node_modules | grep -v .git; then
            echo "::error::Hardcoded user paths found"
            FAIL=1
          fi
          if grep -rn 'AKIA[A-Z0-9]' --include="*.ts" --include="*.tsx" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v .git; then
            echo "::error::Possible AWS key found"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then exit 1; fi
          echo "✅ No secrets or personal paths found"

  # ─────────────────────────────────────────────
  # Job 2: OdaxAI Chat — Lint + Tests + Build
  # ─────────────────────────────────────────────
  test-chat:
    name: OdaxChat · lint + test + build
    runs-on: ubuntu-latest
    needs: hygiene

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/odax-chat/package.json

      - name: Install dependencies
        working-directory: services/odax-chat
        run: npm install --legacy-peer-deps

      - name: Lint
        working-directory: services/odax-chat
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        working-directory: services/odax-chat
        run: npm test

      - name: Type check
        working-directory: services/odax-chat
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        working-directory: services/odax-chat
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:stub"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-STUB
          FIREBASE_PROJECT_ID: stub-project
          FIREBASE_CLIENT_EMAIL: stub@stub-project.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: stub

  # ─────────────────────────────────────────────
  # Job 3: macOS App — Tests + Build (Swift)
  # ─────────────────────────────────────────────
  # NOTE: apps/web (Dashboard) is skipped in CI because it depends on
  # private workspace packages (@odax/db, @odax/types, @odax/ui) that
  # are not tracked in the public repository.

  test-macos:
    name: macOS App · test + build (Swift)
    runs-on: macos-15
    needs: hygiene

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/macos/project
        run: xcodegen generate --spec project.yml --project .

      - name: Run tests
        working-directory: apps/macos/project
        run: |
          xcodebuild test \
            -project OdaxStudio.xcodeproj \
            -scheme OdaxStudioTests \
            -configuration Debug \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
          echo "✅ Swift tests passed"

      - name: Build release
        working-directory: apps/macos/project
        run: |
          xcodebuild \
            -project OdaxStudio.xcodeproj \
            -scheme OdaxStudio \
            -configuration Release \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
          echo "✅ Release build succeeded"
